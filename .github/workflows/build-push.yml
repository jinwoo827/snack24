name: Build & Push Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/snack24

jobs:
  build-jars:
    name: Build JARs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Build bootJar (all services)
        run: ./gradlew bootJar --no-daemon

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: service/*/build/libs/app.jar
          retention-days: 1

  build-push-images:
    name: Build & Push ${{ matrix.service }}
    needs: build-jars
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        service: [identity, catalog, order, billing, api-gateway, notification-worker]

    steps:
      - uses: actions/checkout@v4

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: service-jars
          path: service

      - name: Verify JAR exists
        run: |
          ls -la service/${{ matrix.service }}/build/libs/
          test -f service/${{ matrix.service }}/build/libs/app.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch              # main → :main
            type=ref,event=tag                 # v1.0.0 → :v1.0.0
            type=semver,pattern={{version}}    # v1.0.0 → :1.0.0
            type=semver,pattern={{major}}.{{minor}}  # → :1.0
            type=sha,prefix=,format=short      # → :abc1234
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
          labels: |
            org.opencontainers.image.title=snack24-${{ matrix.service }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: service/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Image digest
        run: echo "${{ matrix.service }} → ${{ steps.meta.outputs.tags }}"