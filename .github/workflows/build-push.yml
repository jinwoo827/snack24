name: Build & Push Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/snack24

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
      any: ${{ steps.set-matrix.outputs.any }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # diff 계산을 위해 전체 히스토리

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            global:
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
              - 'gradle.properties'
              - '.github/workflows/build-push.yml'
            identity:
              - 'service/identity/**'
            catalog:
              - 'service/catalog/**'
            order:
              - 'service/order/**'
            billing:
              - 'service/billing/**'
            api-gateway:
              - 'service/api-gateway/**'
            notification-worker:
              - 'service/notification-worker/**'

      - name: Build dynamic matrix
        id: set-matrix
        run: |
          # 모든 서비스
          ALL='["identity","catalog","order","billing","api-gateway","notification-worker"]'
          
          # 수동 트리거 또는 global 변경 → 전체 빌드
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
             || [ "${{ steps.filter.outputs.global }}" = "true" ]; then
            echo "Trigger: full build"
            echo "services=${ALL}" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # 개별 서비스만 골라서 JSON 배열
          CHANGED=()
          for svc in identity catalog order billing api-gateway notification-worker; do
            VAR_NAME="${svc//-/_}"   # api-gateway → api_gateway 로 변환 (변수명 규칙)
            VAL=$(echo '${{ toJSON(steps.filter.outputs) }}' | jq -r --arg k "$svc" '.[$k] // "false"')
            if [ "$VAL" = "true" ]; then
              CHANGED+=("\"$svc\"")
            fi
          done
          
          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "No service changed — skipping image build"
            echo "services=[]" >> "$GITHUB_OUTPUT"
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            IFS=,
            echo "Changed services: ${CHANGED[*]}"
            echo "services=[${CHANGED[*]}]" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi
  build-jars:
    name: Build JARs
    needs: detect-changes
    if: needs.detect-changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Build bootJar (all services)
        run: ./gradlew bootJar --no-daemon

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: service/*/build/libs/app.jar
          retention-days: 1
    run: |
      SERVICES='${{ needs.detect-changes.outputs.services }}'
      TASKS=$(echo "$SERVICES" | jq -r '.[]' | sed 's|^|:service:|;s|$|:bootJar|' | tr '\n' ' ')
      echo "Running: ./gradlew $TASKS"
      ./gradlew $TASKS --no-daemon

  build-push-images:
    name: Build & Push ${{ matrix.service }}
    needs: [detect-changes, build-jars]
    if: needs.detect-changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: service-jars
          path: service

      - name: Compute image name (lowercase)
        id: img
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${OWNER_LC}/snack24/${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
          labels: |
            org.opencontainers.image.title=snack24-${{ matrix.service }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: service/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}