name: snack24-infra

services:
        mariadb:
                image: mariadb:11
                container_name: snack24-mariadb
                environment:
                        MARIADB_ROOT_PASSWORD: jinwoo
                        TZ: Asia/Seoul
                ports:
                        - "3306:3306"
                volumes:
                        - mariadb-data:/var/lib/mysql
                        - ./mariadb-init:/docker-entrypoint-initdb.d:ro
                healthcheck:
                        test: ["CMD", "mariadb", "-uroot", "-pjinwoo", "-e", "SELECT 1"]
                        interval: 5s
                        timeout: 3s
                        retries: 20

        redis:
                image: redis:7-alpine
                container_name: snack24-redis
                ports:
                        - "6379:6379"
                healthcheck:
                        test: ["CMD", "redis-cli", "ping"]
                        interval: 5s
                        timeout: 3s
                        retries: 20

        kafka:
                image: apache/kafka:3.7.0
                container_name: snack24-kafka
                ports:
                        - "9092:9092"
                environment:
                        KAFKA_NODE_ID: 1
                        KAFKA_PROCESS_ROLES: broker,controller
                        KAFKA_LISTENERS: EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
                        KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
                        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
                        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
                        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
                        KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
                        KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
                        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
                        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
                        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
                healthcheck:
                        test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
                        interval: 10s
                        timeout: 5s
                        retries: 20
                        start_period: 30s

        kafka-ui:
                image: ghcr.io/kafbat/kafka-ui:latest
                container_name: snack24-kafka-ui
                ports:
                        - "8090:8080"
                environment:
                        KAFKA_CLUSTERS_0_NAME: snack24-local
                        KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
                        DYNAMIC_CONFIG_ENABLED: "true"
                depends_on:
                        kafka:
                                condition: service_healthy

volumes:
        mariadb-data: