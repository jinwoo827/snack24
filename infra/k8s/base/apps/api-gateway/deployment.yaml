apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: api-gateway
          image: snack24/api-gateway:latest
          imagePullPolicy: IfNotPresent          # 로컬 import 이미지 사용
          ports:
            - name: http
              containerPort: 8000
          env:
            # Spring profile — application-k8s.yml 사용
            - { name: SPRING_PROFILES_ACTIVE }

            # JWT — Secret 참조
            - name: SNACK24_JWT_SECRET
              valueFrom:
                secretKeyRef: { name: snack24-jwt, key: secret }

            - { name: SNACK24_ROUTES_IDENTITY-URI, value: "http://identity:8001" }
            - { name: SNACK24_ROUTES_CATALOG-URI,  value: "http://catalog:8002" }
            - { name: SNACK24_ROUTES_ORDER-URI,    value: "http://order:8003" }
            - { name: SNACK24_ROUTES_BILLING-URI,  value: "http://billing:8004" }

            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=70.0 -XX:InitialRAMPercentage=50.0"

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          lifecycle:
            preStop:
              exec:
                command: [ "/bin/sh", "-c", "sleep 10" ]
      terminationGracePeriodSeconds: 40