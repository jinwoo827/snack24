apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app: notification-worker }
  template:
    metadata:
      labels: { app: notification-worker }
    spec:
      containers:
        - name: notification-worker
          image: snack24/notification-worker:latest
          imagePullPolicy: IfNotPresent          # 로컬 import 이미지 사용
          ports:
            - name: http
              containerPort: 8005
          env:
            # Spring profile — application-k8s.yml 사용
            - { name: SPRING_PROFILES_ACTIVE, value: "k8s" }

            # Redis
            - { name: SPRING_DATA_REDIS_HOST, value: "redis" }

            # Kafka
            - { name: SPRING_KAFKA_BOOTSTRAP_SERVERS, value: "kafka:29092" }

            # JWT — Secret 참조
            - name: SNACK24_JWT_SECRET
              valueFrom:
                secretKeyRef: { name: snack24-jwt, key: secret }

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          lifecycle:
            preStop:
              exec:
                command: [ "/bin/sh", "-c", "sleep 10" ]
      terminationGracePeriodSeconds: 40