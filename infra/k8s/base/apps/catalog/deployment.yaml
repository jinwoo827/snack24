apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app: catalog }
  template:
    metadata:
      labels: { app: catalog }
    spec:
      containers:
        - name: catalog
          envFrom:
            - configMapRef:
                name: app-env
          image: snack24/catalog:latest
          imagePullPolicy: IfNotPresent          # 로컬 import 이미지 사용
          ports:
            - name: http
              containerPort: 8002
          env:
            # Spring profile — application-k8s.yml 사용
            - { name: SPRING_PROFILES_ACTIVE }

            # DB
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mariadb://mariadb:3306/snack24_catalog"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef: { name: mariadb-credentials, key: password }

            # Redis
            - { name: SPRING_DATA_REDIS_HOST, value: "redis" }

            # Kafka
            - { name: SPRING_KAFKA_BOOTSTRAP_SERVERS, value: "kafka:29092" }

            # JWT — Secret 참조
            - name: SNACK24_JWT_SECRET
              valueFrom:
                secretKeyRef: { name: snack24-jwt, key: secret }

            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=70.0 -XX:InitialRAMPercentage=50.0"

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 40

