apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalog-hpa
  namespace: snack24
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalog
  minReplicas: 1
  maxReplicas: 7
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70      # requests.cpu(200m) 의 70% = 140m 초과 시 스케일 아웃
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100                  # 30초 안에 최대 2배까지
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300 # 5분간 안정적으로 낮아야 줄임 (플랩 방지)
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60