apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: snack24

resources:
  - ../../base

commonLabels:
  environment: dev

images:
  - name: snack24/identity
    newTag: latest
  - name: snack24/catalog
    newTag: latest
  - name: snack24/order
    newTag: latest
  - name: snack24/billing
    newTag: latest

patches:
  - path: replicas-patch.yaml
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=snack24"
  - path: resources-patch.yaml
    target:
      kind: Deployment
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: snack24-gateway

configMapGenerator:
  - name: app-env
    literals:
      - SPRING_PROFILES_ACTIVE=dev
      - LOG_LEVEL=DEBUG