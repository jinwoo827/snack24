server:
  port: 8001
spring:
  application:
    name: snack24-identity
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://127.0.0.1:3306/snack24_identity
    username: root
    password: jinwoo
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate          # 스키마는 Flyway가 책임. 엔티티 불일치 시 부팅 실패로 빠른 검출
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 2s
      lettuce:
        pool:
          max-active: 15
          max-idle: 8
          min-idle: 1

snack24:
  jwt:
    issuer: snack24-identity
    secret: ${SNACK24_JWT_SECRET:dGVzdC1zZWNyZXQtZm9yLWxvY2FsLW9ubHktMzItYnl0ZS1taW4=}
    access-token-validity: PT30M # 30분
    refresh-token-validity: P14D # 14일
logging:
  level:
    com.snack24.identity: debug